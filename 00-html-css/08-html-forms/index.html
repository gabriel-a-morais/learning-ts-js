<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Forms</title>
    <style>
        body {
            font-family: sans-serif;
        }
        label {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <section>
        <form action="#" method="get" target="_self" autocomplete="off">
            <h1>HTML Form</h1>
            <p>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </p>
            <p>
                <label for="dev">Are you a developer?</label>
                <input type="checkbox" id="dev" name="dev" value="yes" checked>
            </p>
            <p>
                Gender: 
                <label for="feminine">Feminine</label>
                <input type="radio" id="feminine" name="gender" value="female">
                <label for="masculine">Masculine</label>
                <input type="radio" id="masculine" name="gender" value="male">
                <label for="other">Other</label>
                <input type="radio" id="other" name="gender" value="other">
            </p>
            <p>
                <label for="date">Date of Birth:</label>
                <input type="date" id="date" name="date" value="2000-01-01">
            </p>
            <p>
                <label for="color">Favorite Color:</label>
                <input type="color" id="color" name="color" value="#ff0000">
            </p>
            <p>
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="e.g., user@email.com">
            </p>
            <p>
                <label for="file">Upload a file:</label>
                <input type="file" id="file" name="file" accept=".png, .jpeg, .svg">
            </p>
            <p>
                <label for="number">Number:</label>
                <input type="number" id="number" name="number" min="0" max="100" step="5">
            </p>
            <p>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
            </p>
            <p>
                <label for="range">Range:</label>
                <input type="range" id="range" name="range" min="0" max="100" step="10" list="tickmarks">
                <datalist id="tickmarks">
                    <option value="0" label="0"></option>
                    <option value="10"></option>
                    <option value="20"></option>
                    <option value="30"></option>
                    <option value="40"></option>
                    <option value="50" label="50"></option>
                    <option value="60"></option>
                    <option value="70"></option>
                    <option value="80"></option>
                    <option value="90"></option>
                    <option value="100" label="100"></option>
                </datalist>
            </p>
            <p>
                <label for="url">URL:</label>
                <input type="url" id="url" name="url" placeholder="e.g., https://example.com">
            </p>
            <p>
                <label for="search">Search:</label>
                <input type="search" id="search" name="search" placeholder="Search...">
            </p>
            <p>
                <label for="select">Select an option:</label>
                <select name="select" id="select">
                    <option value="option1">Option 1</option>
                    <option value="option2">Option 2</option>
                    <option value="option3">Option 3</option>
                </select>
            </p>
            <p>
                <label for="textarea">Message:</label>
                <textarea id="textarea" name="textarea" placeholder="Enter your message"></textarea>
            </p>
            <p>
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </p>
        </form>
    </section>
</body>

</html>
