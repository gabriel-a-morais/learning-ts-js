<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Class Attributes</title>
    <style>
        h1 {
            color: yellow;
        }

        p {
            background: blue;
            color: white;
        }

        #heading-two {
            background: purple;
        }

        .red-background {
            background: red;
        }

        .left-border {
            border-left: 15px solid white;
        }

        .bold {
            color: orange;
        }
    </style>
</head>
<body>
    <h1 id="heading-one" class="red-background">Heading 1</h1>
    <h1 id="heading-two" class="red-background left-border">Heading 2</h1>
    <p>A simple <b class="bold">paragraph</b>.</p>
</body>
</html>
